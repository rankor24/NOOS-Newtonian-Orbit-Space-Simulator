<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-subtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Background Gradients -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#03111e" />
      <stop offset="60%" stop-color="#01070f" />
      <stop offset="100%" stop-color="#000205" />
    </radialGradient>

    <linearGradient id="thruster-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffaa00" stop-opacity="1" />
      <stop offset="50%" stop-color="#ff5500" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg-grad)" />

  <!-- Vector Thruster Plumes -->
  <g id="thrusters" filter="url(#glow-heavy)">
    <!-- Main Left Engine Exhaust -->
    <polygon points="270,555 255,680 285,680" fill="url(#thruster-grad)" />
    <line x1="270" y1="555" x2="270" y2="700" stroke="#ffaa00" stroke-width="2" opacity="0.8" />
    <line x1="260" y1="555" x2="250" y2="650" stroke="#ff5500" stroke-width="1" opacity="0.6" />
    <line x1="280" y1="555" x2="290" y2="650" stroke="#ff5500" stroke-width="1" opacity="0.6" />

    <!-- Main Right Engine Exhaust -->
    <polygon points="530,555 515,680 545,680" fill="url(#thruster-grad)" />
    <line x1="530" y1="555" x2="530" y2="700" stroke="#ffaa00" stroke-width="2" opacity="0.8" />
    <line x1="520" y1="555" x2="510" y2="650" stroke="#ff5500" stroke-width="1" opacity="0.6" />
    <line x1="540" y1="555" x2="550" y2="650" stroke="#ff5500" stroke-width="1" opacity="0.6" />

    <!-- Auxiliary Left Engine Exhaust -->
    <polygon points="320,540 312,620 328,620" fill="url(#thruster-grad)" opacity="0.7" />
    <line x1="320" y1="540" x2="320" y2="640" stroke="#ffaa00" stroke-width="1.5" opacity="0.7" />

    <!-- Auxiliary Right Engine Exhaust -->
    <polygon points="480,540 472,620 488,620" fill="url(#thruster-grad)" opacity="0.7" />
    <line x1="480" y1="540" x2="480" y2="640" stroke="#ffaa00" stroke-width="1.5" opacity="0.7" />
  </g>

  <!-- Ship Structure (Cobra Mk III Inspired Wireframe) -->
  <g id="ship-mesh" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Under-layer Solid Fill for Depth -->
    <polygon points="400,160 640,490 560,550 480,530 400,490 320,530 240,550 160,490" fill="#021324" fill-opacity="0.85" />

    <!-- Outer Hull Wireframe (Primary Cyan) -->
    <g stroke="#00f3ff" stroke-width="2" fill="none" filter="url(#glow-subtle)">
      <!-- Main Boundary -->
      <polygon points="400,160 640,490 560,550 480,530 400,490 320,530 240,550 160,490" fill="#00f3ff" fill-opacity="0.05" />
      
      <!-- Nose & Center Spine -->
      <line x1="400" y1="160" x2="400" y2="490" stroke-width="2.5" />
      
      <!-- Forward Mandibles / Nose Facets -->
      <polygon points="400,160 430,220 400,250 370,220" />
      
      <!-- Main Wing Ridge Lines (Swept Back) -->
      <line x1="400" y1="250" x2="640" y2="490" />
      <line x1="400" y1="250" x2="160" y2="490" />
      
      <!-- Mid-deck Structural Ridges -->
      <line x1="430" y1="220" x2="560" y2="410" />
      <line x1="370" y1="220" x2="240" y2="410" />
      
      <!-- Outer Wing Panel Lines -->
      <line x1="560" y1="410" x2="640" y2="490" />
      <line x1="240" y1="410" x2="160" y2="490" />
      <line x1="560" y1="410" x2="560" y2="550" />
      <line x1="240" y1="410" x2="240" y2="550" />

      <!-- Rear Engine Deck Transverse Lines -->
      <polygon points="320,530 400,490 480,530 400,510" fill="#00f3ff" fill-opacity="0.08" />
      <line x1="320" y1="530" x2="240" y2="550" />
      <line x1="480" y1="530" x2="560" y2="550" />
    </g>

    <!-- Inner Mesh Detailing (Secondary Thin Cyan/Dimmer) -->
    <g stroke="#00b0ff" stroke-width="1" fill="none" stroke-opacity="0.7">
      <!-- Diagonal Structural Crosses (Tessellation) -->
      <!-- Left Wing Mesh -->
      <line x1="240" y1="410" x2="320" y2="460" />
      <line x1="320" y1="460" x2="320" y2="530" />
      <line x1="240" y1="410" x2="320" y2="530" />
      <line x1="160" y1="490" x2="240" y2="550" />
      <line x1="240" y1="410" x2="160" y2="490" />
      <line x1="370" y1="220" x2="320" y2="460" />
      <line x1="370" y1="220" x2="400" y2="490" />

      <!-- Right Wing Mesh -->
      <line x1="560" y1="410" x2="480" y2="460" />
      <line x1="480" y1="460" x2="480" y2="530" />
      <line x1="560" y1="410" x2="480" y2="530" />
      <line x1="640" y1="490" x2="560" y2="550" />
      <line x1="560" y1="410" x2="640" y2="490" />
      <line x1="430" y1="220" x2="480" y2="460" />
      <line x1="430" y1="220" x2="400" y2="490" />

      <!-- Nose Underside Support -->
      <line x1="400" y1="160" x2="320" y2="350" stroke-dasharray="3,3" />
      <line x1="400" y1="160" x2="480" y2="350" stroke-dasharray="3,3" />
      <line x1="320" y1="350" x2="400" y2="490" stroke-dasharray="3,3" />
      <line x1="480" y1="350" x2="400" y2="490" stroke-dasharray="3,3" />
    </g>

    <!-- Cockpit Canopy (Glowing Amber/Orange Wireframe) -->
    <g stroke="#ff7b00" stroke-width="1.5" fill="none" filter="url(#glow-subtle)">
      <!-- Outer Canopy Frame -->
      <polygon points="400,270 435,340 400,380 365,340" fill="#ff7b00" fill-opacity="0.1" />
      
      <!-- Internal Canopy Facets -->
      <line x1="400" y1="270" x2="400" y2="380" />
      <line x1="365" y1="340" x2="435" y2="340" />
      <line x1="382" y1="305" x2="400" y2="340" />
      <line x1="418" y1="305" x2="400" y2="340" />
      <line x1="382" y1="360" x2="400" y2="340" />
      <line x1="418" y1="360" x2="400" y2="340" />
    </g>

    <!-- Heat Radiator Grills (Left & Right Wings) -->
    <g stroke="#ff5500" stroke-width="1" fill="none" opacity="0.8">
      <!-- Left Radiator -->
      <polygon points="260,450 290,440 300,470 270,480" />
      <line x1="265" y1="455" x2="275" y2="485" />
      <line x1="272" y1="452" x2="282" y2="482" />
      <line x1="280" y1="449" x2="290" y2="479" />
      <line x1="287" y1="446" x2="297" y2="476" />

      <!-- Right Radiator -->
      <polygon points="540,450 510,440 500,470 530,480" />
      <line x1="535" y1="455" x2="525" y2="485" />
      <line x1="528" y1="452" x2="518" y2="482" />
      <line x1="520" y1="449" x2="510" y2="479" />
      <line x1="513" y1="446" x2="503" y2="476" />
    </g>

    <!-- Weapon Hardpoints (Retracted/Vector Outline) -->
    <g stroke="#00f3ff" stroke-width="1.5" fill="none">
      <!-- Left Hardpoint -->
      <rect x="215" y="420" width="10" height="25" rx="2" stroke-opacity="0.6" />
      <path d="M 220,420 L 220,410 L 218,410 L 222,410" stroke="#ff7b00" stroke-width="1" />
      
      <!-- Right Hardpoint -->
      <rect x="575" y="420" width="10" height="25" rx="2" stroke-opacity="0.6" />
      <path d="M 580,420 L 580,410 L 578,410 L 582,410" stroke="#ff7b00" stroke-width="1" />
    </g>
  </g>
</svg>